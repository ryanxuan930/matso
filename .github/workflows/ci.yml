# MATSO CI（HOW_TO.md §3.4）：lint → typecheck → unit → contract → schema-sync → integration → replay
# 任一紅 = 不可合併。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python lint / type / unit / replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      # gRPC stubs 不入 git（ADR 005）——lint/type/test 前先離線產生
      - name: Generate gRPC stubs (O2.5)
        run: uv run python ops/tools/gen_proto.py
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      # benchmark（夾具版 p99 SLA）在共享 runner 上不穩 → CI 排除；效能於本機/真檔驗（realdata）
      - name: Unit tests + coverage gate (SPEC_FULL §19.3 ≥80%)
        run: uv run pytest -q --cov --cov-report=term -m "not benchmark"
      - name: Golden replay (SPEC_FULL §19.1)
        run: uv run pytest core/tests/replay -m golden -q --no-cov
      # AI eval gate（SPEC_FULL §19.4 條件式）：用錄放/fallback mock，非真模型。
      # 案例庫空 → schema-only + EVAL_CORPUS_EMPTY 警告（仍綠）；真模型 eval 為手動 workflow。
      - name: AI eval gate (SPEC_FULL §19.4, replay mock)
        run: uv run python -m matso_ai.evals.run

  frontend:
    name: Frontend lint / typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  contracts:
    name: Contract validation (buf / JSON Schema / OpenAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx --yes @bufbuild/buf lint
      - name: buf breaking (PR only, against main)
        if: github.event_name == 'pull_request'
        run: npx --yes @bufbuild/buf breaking --against '.git#branch=origin/main'
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run check-jsonschema --check-metaschema contracts/*.schema.json
      - name: OpenAPI 3.1 validation
        run: |
          uv run python - <<'EOF'
          import yaml
          from openapi_spec_validator import validate
          validate(yaml.safe_load(open("contracts/core_api.yaml")))
          print("OPENAPI OK")
          EOF

  schema-sync:
    name: Prisma migrate + SQLAlchemy drift check
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: matso
          MARIADB_ROOT_PASSWORD: ci_root
        ports: ["3306:3306"]
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://root:ci_root@127.0.0.1:3306/matso
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: db/package-lock.json
      # 注意：不使用 prisma migrate diff 做 drift guard——MariaDB 的 JSON 底層是
      # LONGTEXT+CHECK，diff 對所有 Json 欄位永久誤報 type changed（見 PROGRESS backlog）。
      - name: Apply committed migrations
        working-directory: db
        run: |
          npm ci
          npx prisma migrate deploy
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: SQLAlchemy drift check
        run: uv run python ops/tools/schema_sync_check.py

  integration:
    name: Compose stack + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & start full stack
        working-directory: ops/compose
        run: docker compose up -d --build --wait
      - name: Core healthz smoke
        run: curl -fsS http://localhost:8000/healthz
      - name: Frontend smoke
        run: curl -fsS -o /dev/null http://localhost:3000/
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: db/package-lock.json
      - name: Apply migrations to compose MariaDB
        working-directory: db
        env:
          DATABASE_URL: mysql://root:matso_dev_root@127.0.0.1:3307/matso
        run: |
          npm ci
          npx prisma migrate deploy
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      # gRPC stubs 不入 git（ADR 005）——pytest 收集 core/tests/integration 會 import
      # matso_sdk（weather/comms 整合測試），故收集前須先產生 stubs（同 python job）。
      - name: Generate gRPC stubs (O2.5)
        run: uv run python ops/tools/gen_proto.py
      # O1.7/R4：整合測試必須真的跑在活服務上；出現 skip 視同失敗（防假綠燈）
      - name: Integration tests against live stack
        run: |
          set -o pipefail
          uv run pytest core/tests/integration -m integration -q --no-cov | tee /tmp/itest.out
          if grep -qE "skipped" /tmp/itest.out; then
            echo "::error::integration tests were skipped — services unreachable?"
            exit 1
          fi
      - name: Teardown
        if: always()
        working-directory: ops/compose
        run: docker compose down -v

  e2e:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      # 前端 E2E 的 core（playwright webServer 起 uvicorn）import matso_sdk._generated → 先產生 stubs
      - name: Generate gRPC stubs (O2.5)
        run: uv run python ops/tools/gen_proto.py
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/package-lock.json
      - name: Install frontend deps
        working-directory: platform
        run: npm ci
      - name: Install Playwright chromium
        working-directory: platform
        run: npx playwright install --with-deps chromium
      # playwright.config 的 webServer 會起 seeded core（sqlite + STUB_GATEWAY）+ nuxt dev；
      # E2E_REDIS_URL 指向本 job 的 redis service（WS stream 事件）。
      - name: Run E2E (登入→建局→下令→裁決事件)
        working-directory: platform
        env:
          CI: "true"
          E2E_REDIS_URL: redis://localhost:6379/0
        run: npx playwright test
