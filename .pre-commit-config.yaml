# pre-commit hooks（HOW_TO.md §3）。安裝：uv run pre-commit install
# 只掛 Python + 通用 hygiene；前端 lint 走 npm script 與 CI，避免 node 耦合進 commit hook。
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: 'tsconfig.*\.json$' # tsconfig 是 JSONC（允許註解），非嚴格 JSON
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"] # 防止 TW_ALL.tiff / 模型權重誤入 git

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
