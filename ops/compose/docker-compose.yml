# MATSO Phase 1 拓撲（SPEC_FULL §20.1）
# AI 節點不在 compose 內：獨立主機跑 vLLM，core 以 OPENAI_BASE_URL 指向。
# 尚未加入：tileserver、prometheus/grafana（M0 後續卡）。
name: matso

services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: matso
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-matso_dev_root}
    volumes: [mariadb-data:/var/lib/mysql]
    # 主機 3306 常被其他 MariaDB 占用（本機環境即是），對外一律用 3307
    ports: ["3307:3306"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [qdrant-data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      retries: 5

  terrain:
    build:
      context: ../..
      dockerfile: modules/terrain/Dockerfile
    environment:
      # 地理資產在外接硬碟——路徑一律 env 注入（絕不寫死）。未掛載時服務仍啟動（DEGRADED/DOWN），
      # 由 Core 健檢決定預案。掛載真檔時：解除下方 volumes 註解並指向掛載點。
      MATSO_DTED_PATH: ${MATSO_DTED_PATH:-/data/TW_ALL.tif}
      MATSO_HEX_CACHE_DIR: ${MATSO_HEX_CACHE_DIR:-/data/hexcache}
    volumes:
      - ${M200_MAPS:-/Volumes/M200/Maps}:/data:ro   # 外接硬碟掛載（開發機）；未掛載時 terrain DEGRADED
    ports: ["50051:50051"]

  weather:
    build:
      context: ../..
      dockerfile: modules/weather/Dockerfile
    environment:
      # SYNTHETIC 腳本路徑（想定提供）。未掛載時 DEGRADED 但服務仍在（O5.1）。
      MATSO_WEATHER_SCRIPT_PATH: ${MATSO_WEATHER_SCRIPT_PATH:-/data/synthetic_weather.json}
    # volumes:
    #   - ${WEATHER_SCRIPTS:-./weather-scripts}:/data:ro   # 想定天氣腳本掛載
    ports: ["50052:50052"]

  comms:
    build:
      context: ../..
      dockerfile: modules/comms/Dockerfile
    # 純確定性服務（無外部資料來源）：起得來即 HEALTHY。地形/天氣/EW 由 Core 於呼叫時攜入。
    ports: ["50053:50053"]

  core:
    build:
      context: ../..
      dockerfile: core/Dockerfile
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-matso_dev_root}@mariadb:3306/matso
      REDIS_URL: redis://redis:6379/0
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:8080/v1}
      TERRAIN_GRPC_TARGET: ${TERRAIN_GRPC_TARGET:-terrain:50051}
      WEATHER_GRPC_TARGET: ${WEATHER_GRPC_TARGET:-weather:50052}
    ports: ["8000:8000"]
    depends_on:
      mariadb: { condition: service_healthy }
      redis: { condition: service_healthy }
      terrain: { condition: service_healthy }

  frontend:
    build:
      context: ../../platform
    environment:
      # 瀏覽器（非容器）發 API：apiBase 由瀏覽器直連，故用主機可達位址（非容器內部 core:8000）。
      # 前端所有呼叫皆 client-side（無 SSR fetch），故 localhost:8000 正確；可由 .env 覆寫。
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      # 離線 tile server URL（瀏覽器可達）。預設空 → 地圖以背景+經緯網格+hex 離線渲染（O4.2）。
      # 啟用底圖：掛載 .mbtiles + `docker compose --profile tiles up` + 設 TILE_URL=http://localhost:8081
      NUXT_PUBLIC_TILE_URL: ${TILE_URL:-}
      # 衛星 / 自訂底圖來源（#2，可抽換）——填入即出現對應底圖選項（軍方資料接入點）。
      NUXT_PUBLIC_SATELLITE_URL: ${NUXT_PUBLIC_SATELLITE_URL:-}
      NUXT_PUBLIC_BASEMAPS: ${NUXT_PUBLIC_BASEMAPS:-}
      NUXT_PUBLIC_ONLINE_BASEMAPS: ${NUXT_PUBLIC_ONLINE_BASEMAPS:-}
    ports: ["3000:3000"]
    depends_on:
      core: { condition: service_healthy }

  # 離線向量瓦片服務（O4.2，SPEC §13.2）。**opt-in profile**：預設 / CI 不啟動（無 .mbtiles）。
  # 真 Taiwan 瓦片在外接硬碟 M200——路徑 env 注入（絕不寫死），未掛載時本服務不啟動、地圖降級。
  tileserver:
    image: maptiler/tileserver-gl-light:latest
    profiles: ["tiles"]
    volumes:
      - ${MBTILES_DIR:-/Volumes/M200/Maps/tiles}:/data:ro
    ports: ["8081:8080"]

volumes:
  mariadb-data:
  qdrant-data:
