# Core REST API v0.1.0 — OpenAPI 3.1 骨架（SPEC_FULL §16.1）
# M0-2 補完全部 schema；platform/ 以 openapi-typescript 由本檔生成型別。
openapi: 3.1.0
info:
  title: MATSO Core API
  version: 0.1.0
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "access token（短效）；由 /auth/login 或 /auth/refresh 取得，置於 Authorization: Bearer 標頭"
  parameters:
    SessionId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: oid
      in: path
      required: true
      schema: { type: string, format: uuid }
    UnitId:
      name: uid
      in: path
      required: true
      schema: { type: string }
    EquipmentId:
      name: eid
      in: path
      required: true
      schema: { type: string }
    TaskId:
      name: tid
      in: path
      required: true
      schema: { type: string }
    PluginName:
      name: name
      in: path
      required: true
      schema: { type: string }
  schemas:
    Error:
      type: object
      description: 統一錯誤格式（app.api.errors 產出）
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: error code 枚舉（O3.1 Order pipeline 部分）
              enum:
                - INTERNAL_ERROR
                - AUTH_INVALID_CREDENTIALS
                - AUTH_INVALID_TOKEN
                - AUTH_TOKEN_EXPIRED
                - AUTH_FORBIDDEN
                - SESSION_NOT_FOUND
                - SCENARIO_NOT_FOUND
                - ORDER_NOT_FOUND
                - ORDER_INVALID_PAYLOAD
                - ORDER_UNIT_NOT_FOUND
                - ORDER_PERMISSION_DENIED
                - ORDER_INVALID_TRANSITION
                - ORDER_UNIT_NO_POSITION
                - ORDER_UNREACHABLE
                - ORDER_TARGET_NOT_FOUND
                - ORDER_NO_LOS
                - ORDER_OUT_OF_RANGE
                - ORDER_NO_AMMO
                - ORDER_PRECHECK_FAILED
                - ORDER_ROE_VIOLATION
                - TERRAIN_UNAVAILABLE
                - FACTION_INVALID
                - AI_DISABLED
                - AI_OUTPUT_REJECTED
            message: { type: string }
            details: { type: object }
    UserRole:
      type: string
      enum: [EXERCISE_DIRECTOR, WHITE_CELL_STAFF, COMMANDER, STAFF, OBSERVER, ANALYST, ADMIN]
    Faction:
      type: string
      description: 想定定義的陣營 id（SPEC §12.1/ADR 006）；WHITE_CELL 為統裁保留字。
      pattern: "^[A-Z][A-Z0-9_]{1,31}$"
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 1 }
    TokenPair:
      type: object
      description: access（短效）+ refresh（長效）JWT 對
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: bearer }
        expires_in: { type: integer, description: access token 剩餘秒數 }
    AccessToken:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        token_type: { type: string, const: bearer }
        expires_in: { type: integer }
    CurrentUser:
      type: object
      required: [id, username, role]
      properties:
        id: { type: string }
        username: { type: string }
        role: { $ref: "#/components/schemas/UserRole" }
    SessionSummary:
      type: object
      description: lobby 列表項（faction/角色過濾後）
      required: [id, name, mode, status]
      properties:
        id: { type: string }
        name: { type: string }
        scenario_id: { type: [string, "null"] }
        mode: { type: string }
        status: { type: string }
        my_faction: { type: [string, "null"], description: 呼叫者在此 session 的陣營（非參與者為 null） }
        start_time: { type: [string, "null"], description: 開局（session 建立）時間 ISO8601，供 COP 顯示執行時間 }
        orbat_edit: { type: boolean, default: false, description: 呼叫者是否可編輯本 session 的編裝（白軍全開，或本軍且該局開放自編） }
    UnitView:
      type: object
      required: [id, designation, unit_level, faction, health, comms]
      properties:
        id: { type: string }
        designation: { type: string }
        unit_level: { type: string }
        faction: { type: string }
        lat: { type: [number, "null"] }
        lng: { type: [number, "null"] }
        health: { type: number }
        comms: { type: string }
    WeaponView:
      type: object
      description: 單位可用武器（資料驅動 baseStats）——供 ENGAGE 選武器/彈種
      required: [id, template_id, name, category, min_range_m, ammo_types]
      properties:
        id: { type: string }
        template_id: { type: string }
        name: { type: string }
        category: { type: string }
        max_range_m: { type: [number, "null"] }
        min_range_m: { type: number }
        ammo_types: { type: array, items: { type: string } }
        ammo_remaining: { type: [integer, "null"] }
    EquipmentTemplateView:
      type: object
      description: 裝備範本（武器/感測/通聯…）——編裝編輯器的可配發目錄
      required: [id, name, category, base_stats]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string, description: KINETIC / SENSOR / COMMS / LOGISTICS / DRONE }
        base_stats: { type: object, description: 依 weaponeering.schema.json 驗證的屬性 }
    EquipmentInstanceView:
      type: object
      description: 單位持有的裝備實例（含即時狀態與範本屬性，供編裝編輯器）
      required: [id, template_id, name, category, current_state, base_stats]
      properties:
        id: { type: string }
        template_id: { type: string }
        name: { type: string }
        category: { type: string }
        current_state: { type: object, description: "即時狀態（如 {ammo:100}）" }
        base_stats: { type: object }
    AddEquipmentRequest:
      type: object
      required: [template_id]
      properties:
        template_id: { type: string }
    EquipmentStateEdit:
      type: object
      required: [current_state]
      properties:
        current_state: { type: object, description: "覆寫此實例的即時狀態（如 {ammo:60}）" }
    CreateSessionRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        scenario_id: { type: [string, "null"] }
        mode: { type: string, enum: [REALTIME, WEGO, IGO_UGO], default: REALTIME }
    InjectRequest:
      type: object
      required: [event_type]
      properties:
        event_type: { type: string, minLength: 1 }
        payload: { type: object }
        faction: { type: [string, "null"], description: 受眾陣營（null＝廣播） }
    InjectResponse:
      type: object
      required: [seq]
      properties:
        seq: { type: integer }
    ControlRequest:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [PAUSE, RESUME, ROLLBACK] }
        target_tick: { type: [integer, "null"], description: ROLLBACK 目標 tick }
    OrderType:
      type: string
      enum: [MOVE, ENGAGE, RECON, RESUPPLY, POSTURE]
    OrderStatus:
      type: string
      enum: [PENDING, VALIDATED, EXECUTING, COMPLETED, REJECTED, CANCELLED]
    OrderRequest:
      type: object
      required: [unit_id, order_type]
      properties:
        unit_id: { type: string, minLength: 1 }
        order_type: { $ref: "#/components/schemas/OrderType" }
        payload:
          type: object
          description: "依 order_type 而異：MOVE={to_h3,mobility_profile}；ENGAGE={target_unit_id,weapon_id?,ammo_type?}"
    PrecheckCheck:
      type: object
      required: [name, passed]
      properties:
        name: { type: string }
        passed: { type: boolean }
        detail: { type: string }
    PrecheckResult:
      type: object
      required: [feasible, checks]
      properties:
        feasible: { type: boolean }
        checks: { type: array, items: { $ref: "#/components/schemas/PrecheckCheck" } }
        reason: { type: [string, "null"] }
    OrderResponse:
      type: object
      required: [id, unit_id, order_type, status, issued_at_tick]
      properties:
        id: { type: string }
        unit_id: { type: string }
        order_type: { type: string }
        status: { $ref: "#/components/schemas/OrderStatus" }
        precheck:
          oneOf:
            - $ref: "#/components/schemas/PrecheckResult"
            - type: "null"
        issued_at_tick: { type: integer }
paths:
  /auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: JWT pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { description: Invalid credentials, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /auth/refresh:
    post:
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: 新的 token 對（滑動續期：access + 新 refresh）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { description: Invalid or expired refresh token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /auth/logout:
    post:
      operationId: logout
      security: [{ bearerAuth: [] }]
      description: 用戶端丟棄 token 即登出（無狀態 JWT）；此端點供審計/對稱性
      responses: { "204": { description: Logged out } }
  /auth/me:
    get:
      operationId: currentUser
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current authenticated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }
        "401": { description: Unauthenticated, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions:
    get:
      operationId: listSessions
      security: [{ bearerAuth: [] }]
      description: 依角色/參與過濾（director/white/admin 見全部；其餘見自己參與的）
      responses:
        "200":
          description: Role-filtered sessions
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SessionSummary" } }
        "401": { description: Unauthenticated, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      operationId: createSession
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionSummary" }
        "401": { description: Unauthenticated, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/lifecycle:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    post:
      operationId: sessionLifecycle
      description: "action: START|PAUSE|RESUME|END|ROLLBACK (+checkpoint_tick)"
      responses: { "200": { description: OK } }
  /sessions/{id}/state:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    get: { operationId: getState, description: faction-scoped 全量快照（重連用）, responses: { "200": { description: Snapshot } } }
  /sessions/{id}/units:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    get:
      operationId: listUnits
      security: [{ bearerAuth: [] }]
      description: faction-scoped 單位（一般角色見己方；全知見全部；White Cell 可 as_faction 切換視角）
      parameters:
        - name: as_faction
          in: query
          required: false
          schema: { type: string }
          description: White Cell 視角切換——以某陣營視角過濾（O7.4）；非全知者使用→403
      responses:
        "200":
          description: Units
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/UnitView" } }
        "403": { description: Not a participant, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/units/{uid}/weapons:
    parameters:
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/UnitId" }
    get:
      operationId: listUnitWeapons
      security: [{ bearerAuth: [] }]
      description: 單位可用武器（資料驅動 baseStats）；fog of war：全知見任一，否則僅己方單位（他方→403）
      responses:
        "200":
          description: Weapons
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/WeaponView" } }
        "403": { description: Not own faction, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /equipment-templates:
    get:
      operationId: listEquipmentTemplates
      security: [{ bearerAuth: [] }]
      description: 裝備範本目錄（編裝編輯器配發用）
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EquipmentTemplateView" } }
  /sessions/{id}/units/{uid}/equipment:
    parameters:
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/UnitId" }
    get:
      operationId: listUnitEquipment
      security: [{ bearerAuth: [] }]
      description: 單位編裝清單（fog of war：全知見任一，否則僅己方單位→403）
      responses:
        "200":
          description: Equipment
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/EquipmentInstanceView" } }
        "403": { description: Not own faction, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      operationId: addUnitEquipment
      security: [{ bearerAuth: [] }]
      description: 為單位配發一件裝備（編裝編輯權限：白軍，或本軍且該局開放自編）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddEquipmentRequest" }
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentInstanceView" }
        "403": { description: No orbat-edit permission, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/units/{uid}/equipment/{eid}:
    parameters:
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/UnitId" }
      - { $ref: "#/components/parameters/EquipmentId" }
    patch:
      operationId: editUnitEquipment
      security: [{ bearerAuth: [] }]
      description: 覆寫裝備實例即時狀態（如彈藥量）——編裝編輯權限
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EquipmentStateEdit" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EquipmentInstanceView" }
        "403": { description: No orbat-edit permission, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      operationId: removeUnitEquipment
      security: [{ bearerAuth: [] }]
      description: 移除單位的一件裝備——編裝編輯權限
      responses:
        "204": { description: Removed }
        "403": { description: No orbat-edit permission, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/inject:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    post:
      operationId: injectEvent
      security: [{ bearerAuth: [] }]
      description: White Cell ad-hoc 事件注入（SPEC §11.3）。限 EXERCISE_DIRECTOR / WHITE_CELL_STAFF。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InjectRequest" }
      responses:
        "201":
          description: Injected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InjectResponse" }
        "403": { description: Not White Cell, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/control:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    post:
      operationId: sessionControl
      security: [{ bearerAuth: [] }]
      description: White Cell 時間控制（PAUSE/RESUME/ROLLBACK，SPEC §12/§3.4）。限統裁。
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ControlRequest" }
      responses:
        "201":
          description: Control event emitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InjectResponse" }
        "403": { description: Not White Cell, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/orders:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    get:
      operationId: listOrders
      security: [{ bearerAuth: [] }]
      description: 列出 session 指令（pending + 歷史，faction-scoped）
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/OrderResponse" } }
        "403": { description: Not a participant, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      operationId: issueOrder
      security: [{ bearerAuth: [] }]
      description: 驗證 + 物理預檢；通過 → 201 VALIDATED，不可行 → 422（order 落庫為 REJECTED）
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderRequest" }
      responses:
        "201":
          description: Order validated & queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderResponse" }
        "403": { description: Permission denied, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Session not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "422": { description: Validation or physics precheck failed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "503": { description: Terrain plugin unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/orders/{oid}:
    parameters:
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/OrderId" }
    delete:
      operationId: cancelOrder
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderResponse" }
        "404": { description: Order not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: Order not cancellable (illegal transition), content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /sessions/{id}/ai/consult:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    post:
      operationId: aiConsult
      description: "{role, query} → 202 + task_id（非同步；逾時 doctrine fallback）"
      responses: { "202": { description: Task queued } }
  /sessions/{id}/ai/tasks/{tid}:
    parameters:
      - { $ref: "#/components/parameters/SessionId" }
      - { $ref: "#/components/parameters/TaskId" }
    get: { operationId: aiTaskStatus, responses: { "200": { description: Task status/result } } }
  /sessions/{id}/injects:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    post: { operationId: mselInject, description: White Cell only, responses: { "201": { description: Injected } } }
  /sessions/{id}/ledger:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    get:
      operationId: queryLedger
      description: "?after_seq=&types=  分頁、faction-scoped 投影"
      responses: { "200": { description: Events } }
  /sessions/{id}/aar:
    parameters: [{ $ref: "#/components/parameters/SessionId" }]
    get: { operationId: getAAR, responses: { "200": { description: AAR report } } }
  /scenarios:
    get: { operationId: listScenarios, responses: { "200": { description: Scenarios } } }
    post: { operationId: uploadScenario, responses: { "201": { description: Validated & stored } } }
  /admin/plugins:
    get: { operationId: listPlugins, responses: { "200": { description: Plugin registry } } }
  /admin/plugins/{name}/toggle:
    parameters: [{ $ref: "#/components/parameters/PluginName" }]
    post: { operationId: togglePlugin, responses: { "200": { description: Toggled } } }
